<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Register — SecureFlow</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root {
  --bg:#050a0f;--surface:#0a1420;--surface2:#0f1e2e;
  --accent:#00e5ff;--accent2:#7c3aed;--accent3:#10b981;
  --danger:#ef4444;--warn:#f59e0b;--text:#e2e8f0;
  --muted:#64748b;--border:rgba(0,229,255,0.12);
}
body{background:var(--bg);color:var(--text);font-family:'Syne',sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;overflow-x:hidden;position:relative;padding:2rem 1rem;}
.grid-bg{position:fixed;inset:0;background-image:linear-gradient(rgba(0,229,255,0.03) 1px,transparent 1px),linear-gradient(90deg,rgba(0,229,255,0.03) 1px,transparent 1px);background-size:50px 50px;pointer-events:none;}
.glow-l{position:fixed;right:-10%;top:50%;transform:translateY(-50%);width:500px;height:600px;background:radial-gradient(ellipse,rgba(0,229,255,0.08) 0%,transparent 70%);pointer-events:none;}
.glow-r{position:fixed;left:-5%;bottom:10%;width:350px;height:350px;background:radial-gradient(circle,rgba(124,58,237,0.1) 0%,transparent 70%);pointer-events:none;}
.card-wrap{position:relative;z-index:1;width:100%;max-width:460px;animation:slideUp 0.5s ease both;}
@keyframes slideUp{from{opacity:0;transform:translateY(30px)}to{opacity:1;transform:translateY(0)}}
.card{background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:2.5rem;box-shadow:0 40px 80px rgba(0,0,0,0.4);}
.card-top{text-align:center;margin-bottom:2rem;}
.logo-link{display:inline-flex;align-items:center;gap:0.6rem;text-decoration:none;margin-bottom:1.5rem;}
.logo-icon{width:36px;height:36px;background:var(--accent);border-radius:9px;display:grid;place-items:center;color:#050a0f;font-weight:800;font-size:1rem;}
.logo-text{font-weight:700;font-size:1.15rem;color:var(--accent);}
h1{font-size:1.7rem;font-weight:800;letter-spacing:-0.5px;margin-bottom:0.4rem;}
.card-sub{color:var(--muted);font-size:0.88rem;font-weight:400;}
.form-group{margin-bottom:1.1rem;}
label{display:block;font-size:0.78rem;font-weight:600;color:var(--muted);margin-bottom:0.45rem;letter-spacing:0.5px;text-transform:uppercase;font-family:'Space Mono',monospace;}
.input-wrap{position:relative;}
.input-icon{position:absolute;left:1rem;top:50%;transform:translateY(-50%);color:var(--muted);font-size:0.85rem;pointer-events:none;}
input{width:100%;padding:0.8rem 1rem 0.8rem 2.8rem;background:var(--surface2);border:1px solid var(--border);border-radius:10px;color:var(--text);font-family:'Syne',sans-serif;font-size:0.95rem;transition:all 0.2s;outline:none;}
input:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(0,229,255,0.08);}
input.err{border-color:var(--danger);}
input.ok{border-color:var(--accent3);}

/* password strength */
.strength-wrap{margin-top:0.5rem;}
.strength-bar{height:3px;border-radius:2px;background:var(--surface2);overflow:hidden;margin-bottom:0.3rem;}
.strength-fill{height:100%;border-radius:2px;transition:all 0.3s;width:0;}
.strength-label{font-family:'Space Mono',monospace;font-size:0.65rem;color:var(--muted);}

/* requirements */
.req-list{display:grid;grid-template-columns:1fr 1fr;gap:0.3rem;margin-top:0.6rem;}
.req{font-family:'Space Mono',monospace;font-size:0.65rem;color:var(--muted);display:flex;align-items:center;gap:0.3rem;transition:color 0.2s;}
.req.met{color:var(--accent3);}

.btn-submit{width:100%;padding:0.9rem;background:var(--accent);color:#050a0f;border:none;border-radius:10px;font-family:'Syne',sans-serif;font-size:1rem;font-weight:700;cursor:pointer;transition:all 0.2s;margin-top:0.5rem;position:relative;overflow:hidden;}
.btn-submit:hover{transform:translateY(-1px);box-shadow:0 6px 20px rgba(0,229,255,0.3);}
.btn-submit.loading{color:transparent;pointer-events:none;}
.btn-submit.loading::after{content:'';position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:20px;height:20px;border:2px solid #050a0f40;border-top-color:#050a0f;border-radius:50%;animation:spin 0.6s linear infinite;}
@keyframes spin{to{transform:translate(-50%,-50%) rotate(360deg)}}
.msg{display:none;padding:0.75rem 1rem;border-radius:8px;font-size:0.82rem;margin-bottom:1.2rem;font-family:'Space Mono',monospace;animation:fadeIn 0.3s ease;}
@keyframes fadeIn{from{opacity:0;transform:translateY(-5px)}to{opacity:1;transform:translateY(0)}}
.msg.error{background:rgba(239,68,68,0.1);border:1px solid rgba(239,68,68,0.25);color:var(--danger);}
.msg.success{background:rgba(16,185,129,0.1);border:1px solid rgba(16,185,129,0.25);color:var(--accent3);}
.divider{display:flex;align-items:center;gap:1rem;margin:1.5rem 0;color:var(--muted);font-size:0.75rem;font-family:'Space Mono',monospace;}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:var(--border);}
.card-footer{text-align:center;margin-top:1.2rem;font-size:0.88rem;color:var(--muted);}
.card-footer a{color:var(--accent);text-decoration:none;font-weight:600;}
.card-footer a:hover{text-decoration:underline;}
.security-note{display:flex;align-items:center;gap:0.5rem;padding:0.7rem 1rem;background:rgba(0,229,255,0.05);border:1px solid rgba(0,229,255,0.12);border-radius:8px;margin-bottom:1.5rem;font-family:'Space Mono',monospace;font-size:0.65rem;color:var(--accent);}
</style>
</head>
<body>
<div class="grid-bg"></div>
<div class="glow-l"></div>
<div class="glow-r"></div>

<div class="card-wrap">
  <div class="card">
    <div class="card-top">
      <a href="/" class="logo-link">
        <div class="logo-icon">S</div>
        <span class="logo-text">SecureFlow</span>
      </a>
      <h1>Create account</h1>
      <p class="card-sub">Join the SSDLC demo platform</p>
    </div>

    <div class="security-note">
      🔐 Passwords hashed with bcrypt (cost factor 12) · No plaintext stored
    </div>

    <div class="msg" id="msg"></div>

    <form id="regForm" autocomplete="off">
      <div class="form-group">
        <label>Username</label>
        <div class="input-wrap">
          <span class="input-icon">👤</span>
          <input type="text" id="username" placeholder="Choose a username" required autocomplete="off"/>
        </div>
      </div>

      <div class="form-group">
        <label>Email</label>
        <div class="input-wrap">
          <span class="input-icon">📧</span>
          <input type="email" id="email" placeholder="your@email.com" required autocomplete="off"/>
        </div>
      </div>

      <div class="form-group">
        <label>Password</label>
        <div class="input-wrap">
          <span class="input-icon">🔑</span>
          <input type="password" id="password" placeholder="Min. 8 characters" required autocomplete="new-password"/>
        </div>
        <div class="strength-wrap">
          <div class="strength-bar"><div class="strength-fill" id="strengthFill"></div></div>
          <div class="strength-label" id="strengthLabel">Enter a password</div>
        </div>
        <div class="req-list">
          <div class="req" id="r-len">· 8+ characters</div>
          <div class="req" id="r-upper">· Uppercase letter</div>
          <div class="req" id="r-lower">· Lowercase letter</div>
          <div class="req" id="r-num">· Number</div>
        </div>
      </div>

      <div class="form-group">
        <label>Confirm Password</label>
        <div class="input-wrap">
          <span class="input-icon">✅</span>
          <input type="password" id="confirm" placeholder="Repeat password" required autocomplete="new-password"/>
        </div>
      </div>

      <button type="submit" class="btn-submit" id="submitBtn">Create Account</button>
    </form>

    <div class="divider">or</div>
    <div class="card-footer">Already have an account? <a href="/login">Sign in</a></div>
    <div class="card-footer" style="margin-top:0.5rem;"><a href="/">← Back to home</a></div>
  </div>
</div>

<script>
const pwInput = document.getElementById('password');
const confirmInput = document.getElementById('confirm');
const fill = document.getElementById('strengthFill');
const label = document.getElementById('strengthLabel');

function getStrength(pw) {
  let score = 0;
  if (pw.length >= 8) score++;
  if (pw.length >= 12) score++;
  if (/[A-Z]/.test(pw)) score++;
  if (/[a-z]/.test(pw)) score++;
  if (/[0-9]/.test(pw)) score++;
  if (/[^A-Za-z0-9]/.test(pw)) score++;
  return score;
}

pwInput.addEventListener('input', () => {
  const pw = pwInput.value;
  const s = getStrength(pw);
  const pct = Math.min(100, (s/6)*100);
  fill.style.width = pct + '%';

  if (s <= 2) { fill.style.background = '#ef4444'; label.textContent = 'Weak'; label.style.color = '#ef4444'; }
  else if (s <= 4) { fill.style.background = '#f59e0b'; label.textContent = 'Fair'; label.style.color = '#f59e0b'; }
  else { fill.style.background = '#10b981'; label.textContent = 'Strong'; label.style.color = '#10b981'; }

  document.getElementById('r-len').className = 'req' + (pw.length >= 8 ? ' met' : '');
  document.getElementById('r-upper').className = 'req' + (/[A-Z]/.test(pw) ? ' met' : '');
  document.getElementById('r-lower').className = 'req' + (/[a-z]/.test(pw) ? ' met' : '');
  document.getElementById('r-num').className = 'req' + (/[0-9]/.test(pw) ? ' met' : '');
});

confirmInput.addEventListener('input', () => {
  if (confirmInput.value && confirmInput.value !== pwInput.value) {
    confirmInput.classList.add('err'); confirmInput.classList.remove('ok');
  } else if (confirmInput.value) {
    confirmInput.classList.add('ok'); confirmInput.classList.remove('err');
  }
});

const form = document.getElementById('regForm');
const msg = document.getElementById('msg');
const btn = document.getElementById('submitBtn');

function showMsg(text, type) {
  msg.textContent = type === 'error' ? '✗ ' + text : '✓ ' + text;
  msg.className = 'msg ' + type;
  msg.style.display = 'block';
}

form.addEventListener('submit', async (e) => {
  e.preventDefault();
  const username = document.getElementById('username').value.trim();
  const email = document.getElementById('email').value.trim();
  const password = pwInput.value;
  const confirm = confirmInput.value;

  if (password !== confirm) return showMsg('Passwords do not match.', 'error');
  if (password.length < 8) return showMsg('Password must be at least 8 characters.', 'error');

  btn.classList.add('loading');
  msg.style.display = 'none';

  try {
    const res = await fetch('/api/register', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ username, email, password })
    });
    const data = await res.json();
    btn.classList.remove('loading');
    if (data.success) {
      showMsg(data.message + ' Redirecting to login...', 'success');
      setTimeout(() => window.location.href = '/login', 1500);
    } else {
      showMsg(data.message, 'error');
    }
  } catch {
    btn.classList.remove('loading');
    showMsg('Connection error. Try again.', 'error');
  }
});
</script>
</body>
</html>
